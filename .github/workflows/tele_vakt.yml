name: Tele-Vakt Troms Overvåking

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Henter kode
      uses: actions/checkout@v4

    - name: Setter opp Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installerer requests
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Kjører tele_vakt.py
      env:
        SLACK_TELENOR: ${{ secrets.SLACK_TELENOR }}
      run: python tele_vakt.py
