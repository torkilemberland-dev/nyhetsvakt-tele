name: Regnskap og Konkurs-Sjekk

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sjekk-regnskap:
    runs-on: ubuntu-latest

    steps:
    - name: Henter kode
      uses: actions/checkout@v4

    - name: Setter opp Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installerer pakker
      run: |
        python -m pip install --upgrade pip
        pip install requests python-dotenv

    - name: Kjører regnskapssjekk
      env:
        # Kobler til brreg-hemmeligheten
        SLACK_BRREG: ${{ secrets.SLACK_BRREG }}
      run: python regnskap_varsel.py
