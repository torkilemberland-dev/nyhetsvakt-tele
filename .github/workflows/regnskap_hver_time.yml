name: Regnskap og Konkurs-Sjekk

on:
  schedule:
    # Kjører nøyaktig én gang i timen (på minutt 0)
    - cron: '0 * * * *'
  workflow_dispatch:
    # Gjør at du kan test-kjøre manuelt på GitHub

jobs:
  sjekk-regnskap:
    runs-on: ubuntu-latest

    steps:
    - name: Henter kode
      uses: actions/checkout@v4

    - name: Setter opp Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installerer pakker
      run: |
        python -m pip install --upgrade pip
        pip install requests python-dotenv

    - name: Kjører regnskapssjekk
      env:
        # Sender med Slack-safen din til dette skriptet også
        SLACK_TELENOR: ${{ secrets.SLACK_TELENOR }}
      run: python regnskap_varsel.py
